version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    # Only propose direct dependency updates. Transitive bumps are doomed:
    # the committed lockfile resolver reverts them, so those PRs never merge.
    # The monthly deps-refresh.yml workflow keeps transitive deps fresh instead.
    allow:
      - dependency-type: "direct"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
