name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: '3.12'
      - run: uv sync --frozen
      - run: |
          uv run pytest || exit_code=$?
          if [ "${exit_code:-0}" -eq 5 ]; then
            echo "No tests collected — skipping"
          else
            exit ${exit_code:-0}
          fi
