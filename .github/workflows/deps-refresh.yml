name: Monthly Dependency Refresh
on:
  schedule:
    - cron: "23 4 6 * *"
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: deps-refresh
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - name: Refresh lockfile
        run: uv lock --upgrade
      - name: Validate (install + tests)
        run: |
          uv sync --frozen
          uv run pytest || exit_code=$?
          if [ "${exit_code:-0}" -eq 5 ]; then echo "No tests collected — skipping"; else exit ${exit_code:-0}; fi
      - name: Open PR with refreshed lockfile
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PUSH_PAT || github.token }}
          branch: deps/monthly-refresh
          delete-branch: true
          commit-message: "deps: monthly lockfile refresh"
          title: "deps: monthly dependency refresh"
          body: |
            Automated monthly refresh of uv.lock to the latest resolver-compatible
            versions. CI passed on this branch. Review and merge if green.
          labels: dependencies
